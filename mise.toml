[tools]
python = "3.13"
node = "22"
pnpm = "10"

[tasks.build]
description = "Parse .md artifacts → validate → generate docs/dist/index.html"
run = "node scripts/build-docs.js"

[tasks.build-watch]
description = "Rebuild on file changes"
run = "node scripts/build-docs.js --watch"

[tasks.validate]
description = "Parse + validate only (no HTML output); exits 1 on errors"
run = "node scripts/build-docs.js --validate-only"
