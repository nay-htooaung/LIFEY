[tools]
python = "3.13"
node = "22"
pnpm = "10"
java = "corretto-17"

[settings]
experimental = true

[env]
_.path = ["{{config_root}}/node_modules/.bin"]
ANDROID_HOME = "{{env.LOCALAPPDATA}}/Android/Sdk"
ANDROID_SDK_ROOT = "{{env.LOCALAPPDATA}}/Android/Sdk"
JAVA_HOME = "{{config_root}}/.mise/installs/java/corretto-17.0.19.10.1"

[deps.pnpm]
auto = true

[tasks.build-doc]
description = "Parse .md artifacts → validate → generate docs/dist/index.html"
run = "pnpm run build-doc"

[tasks.build-doc-watch]
description = "Rebuild on file changes"
run = "pnpm run build-doc:watch"

[tasks.validate-doc]
description = "Parse + validate project docs only (no HTML output); exits 1 on errors"
run = "pnpm run validate-doc"

[tasks.convert-md]
description = "Convert one or more .md files to .docx + .pdf in docs/dist/"
run = "pnpm run convert-md"
# Usage: mise run convert-md path/to/file.md [file2.md ...]

[tasks.validate-tests]
description = "Validate test coverage against story ACs (--story EPxxxx-STxxxx, --epic EPxxxx, or --all)"
run = "node scripts/validate-tests.js"
alias = "vt"

[tasks.validate-tests-story]
description = "Validate tests for a single story"
run = "node scripts/validate-tests.js --story"
alias = "vts"

[tasks.validate-tests-epic]
description = "Validate tests for an entire epic"
run = "node scripts/validate-tests.js --epic"
alias = "vte"

[tasks.validate-tests-all]
description = "Validate test coverage for all stories and epics"
run = "node scripts/validate-tests.js --all"
alias = "vta"

# ------------------------------------------------------------------
# Frontend development tasks (delegate to frontend/ via pnpm -F)
# ------------------------------------------------------------------

[tasks.dev]
description = "Start the Vite dev server for the frontend SPA (HTTP on localhost)"
run = "pnpm --filter lifey-frontend dev"

[tasks.build]
description = "Build the frontend for production"
run = "pnpm --filter lifey-frontend build"

[tasks.test]
description = "Run frontend tests with vitest"
run = "pnpm --filter lifey-frontend test"

[tasks.lint]
description = "Lint frontend source files with ESLint"
run = "pnpm --filter lifey-frontend lint"

[tasks.format]
description = "Format frontend source files with Prettier"
run = "pnpm --filter lifey-frontend format"

[tasks.format-check]
description = "Check frontend formatting without writing"
run = "pnpm --filter lifey-frontend format:check"

[tasks.typecheck]
description = "Type-check frontend with tsc --noEmit"
run = "pnpm --filter lifey-frontend typecheck"
